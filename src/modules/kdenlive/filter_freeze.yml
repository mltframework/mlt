schema_version: 7.2
type: filter
identifier: freeze
title: Freeze frame
version: 2
copyright: Jean-Baptiste Mardelle
creator: Jean-Baptiste Mardelle
license: LGPLv2.1
language: en
tags:
  - Video
image_formats:
  - rgb
  - rgba
  - yuv422
  - yuv420p
  - yuv422p16
  - yuv420p10
  - yuv444p10
  - rgba64
parameters:
  - identifier: frame
    title: Frame
    type: time
    description: The time of the frame to freeze
    default: 0
    mutable: true

  - identifier: freeze_after
    title: Freeze After
    type: boolean
    description: Whether to only freeze the frames after
    default: false
    mutable: true

  - identifier: freeze_before
    title: Freeze Before
    type: boolean
    description: Whether to only freeze the frames before
    default: false
    mutable: true
