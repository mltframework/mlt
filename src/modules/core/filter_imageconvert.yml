schema_version: 7.2
type: filter
identifier: imageconvert
title: Basic Image Converter
version: 2
copyright: Meltytech, LLC
license: LGPLv2.1
language: en
tags:
  - Video
description: Converts the colorspace and pixel format.
notes: >
  This is not intended to be created directly. Rather, the loader producer
  loads it if it is available to register an image conversion callback on frames.
  This implementation is old and naive by assuming all YCbCr video is ITU-R BT.601
  and all RGB is sRGB.
image_formats:
  - rgb
  - rgba
  - yuv420p
  - yuv422
