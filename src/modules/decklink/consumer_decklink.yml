schema_version: 7.2
type: consumer
identifier: decklink
title: Blackmagic Design DeckLink Output
version: 4
copyright: Copyright (C) 2010-2026 Meltytech, LLC
license: LGPL
language: en
creator: Dan Dennedy
tags:
  - Audio
  - Video
description: >
  Output audio and video using Blackmagic Design DeckLink SDI or Intensity
  HDMI cards.
notes: >
  Please ensure that you use a MLT profile that is compatible with a broadcast
  standard which the card you are using supports. HDR output metadata follows
  the consumer's color transfer characteristic. When color_trc is set to
  arib-std-b67, the DeckLink output advertises HLG. When color_trc is set to
  smpte2084, the DeckLink output advertises PQ and the HDR static metadata
  properties documented below are applied. Any other transfer clears HDR
  metadata and advertises SDR.
bugs:
  - Only internal keying is supported at this time.
  - Only 8-bit Y'CbCr or RGBA (key) is supported at this time.
audio_formats:
  - s16
image_formats:
  - rgba
  - yuv422
parameters:
  - identifier: resource
    argument: yes
    title: Card
    type: integer
    readonly: no
    required: no
    mutable: no
    default: 0
    minimum: 0
    widget: spinner

  - identifier: preroll
    title: Pre-roll Count
    type: integer
    description: >
      This controls the amount of buffering in the DeckLink driver/library.
      Increase this if you get video tearing or choppy audio. However, as
      you increase the amount, you increase the risk of audio and video
      becoming out of synchronization.
    readonly: no
    required: no
    mutable: no
    default: 3
    minimum: 2
    unit: frames
    widget: spinner

  - identifier: keyer
    title: Enable Keyer
    type: integer
    description: >
      Keying is the process of compositing MLT output over a live SDI input.
      The alpha channel of the MLT video controls the transparent areas, and
      the keyer supports alpha-blending. You can not control the compositing
      rectangle. Rather, the entire MLT output overlays the entire video
      input. Therefore, you must use MLT's compositing services to control
      the size and position. The value 1 enables the internal keyer, the
      value 2 enables the external keyer, and the value 0 disables it.
    readonly: no
    required: no
    mutable: no
    default: 0
    minimum: 0
    maximum: 2

  - identifier: keyer_level
    title: Key Opacity
    type: float
    description: >
      This controls the level of blending between the key and the input video.
      1 is fully opaque and something near 0 is transparent. However, absolute
      0 is considered as "not supplied" and also fully opaque. 0.5 is an
      evenly balanced blending of the key and input video.
    readonly: no
    required: no
    mutable: no
    minimum: 0
    maximum: 1
    default: 1
    widget: slider

  - identifier: devices
    title: Number of devices
    type: integer
    readonly: yes
    minimum: 0

  - identifier: device.*
    title: Device model
    description: The model name of each device that provides output.
    type: string
    readonly: yes

  - identifier: sliced_swab
    title: Use sliced swab operation
    description: This option enables multithreaded parallel swab frame data operation
    type: boolean
    readonly: no
    minimum: 0
    maximum: 1
    default: 0
    widget: checkbox

  - identifier: colorspace
    title: Colorspace
    type: integer
    description: >
      Set the output colorspace metadata. BT.2020 maps to DeckLink Rec.2020,
      BT.601 maps to DeckLink Rec.601, and all other values default to Rec.709.
    values:
      - 240 # SMPTE 240M
      - 601 # ITU-R BT.601
      - 709 # ITU-R BT.709
      - 2020 # ITU-R BT.2020 non-constant luminance

  - identifier: color_trc
    title: Transfer characteristic
    type: string
    description: >
      Set the output transfer characteristic metadata. Use arib-std-b67 for
      HLG or smpte2084 for PQ HDR10-style signaling. Any other value is treated
      as SDR and clears the DeckLink HDR metadata flag.
    values:
      - bt709
      - smpte170m
      - smpte240m
      - bt470bg
      - arib-std-b67
      - smpte2084

  - identifier: hdr_red_x
    title: HDR primary red X
    type: float
    description: PQ-only static HDR metadata. Red display primary chromaticity X.
    minimum: 0
    maximum: 1
    default: 0.708

  - identifier: hdr_red_y
    title: HDR primary red Y
    type: float
    description: PQ-only static HDR metadata. Red display primary chromaticity Y.
    minimum: 0
    maximum: 1
    default: 0.292

  - identifier: hdr_green_x
    title: HDR primary green X
    type: float
    description: PQ-only static HDR metadata. Green display primary chromaticity X.
    minimum: 0
    maximum: 1
    default: 0.170

  - identifier: hdr_green_y
    title: HDR primary green Y
    type: float
    description: PQ-only static HDR metadata. Green display primary chromaticity Y.
    minimum: 0
    maximum: 1
    default: 0.797

  - identifier: hdr_blue_x
    title: HDR primary blue X
    type: float
    description: PQ-only static HDR metadata. Blue display primary chromaticity X.
    minimum: 0
    maximum: 1
    default: 0.131

  - identifier: hdr_blue_y
    title: HDR primary blue Y
    type: float
    description: PQ-only static HDR metadata. Blue display primary chromaticity Y.
    minimum: 0
    maximum: 1
    default: 0.046

  - identifier: hdr_white_x
    title: HDR white point X
    type: float
    description: PQ-only static HDR metadata. Display white point chromaticity X.
    minimum: 0
    maximum: 1
    default: 0.3127

  - identifier: hdr_white_y
    title: HDR white point Y
    type: float
    description: PQ-only static HDR metadata. Display white point chromaticity Y.
    minimum: 0
    maximum: 1
    default: 0.329

  - identifier: hdr_max_luminance
    title: HDR mastering max luminance
    type: float
    description: PQ-only static HDR metadata. Maximum mastering display luminance.
    minimum: 1
    maximum: 65535
    default: 1000
    unit: cd/m2

  - identifier: hdr_min_luminance
    title: HDR mastering min luminance
    type: float
    description: PQ-only static HDR metadata. Minimum mastering display luminance.
    minimum: 0.0001
    maximum: 6.5535
    default: 0.01
    unit: cd/m2

  - identifier: hdr_max_cll
    title: HDR MaxCLL
    type: float
    description: PQ-only static HDR metadata. Maximum Content Light Level.
    minimum: 1
    maximum: 65535
    default: 1000
    unit: cd/m2

  - identifier: hdr_max_fall
    title: HDR MaxFALL
    type: float
    description: PQ-only static HDR metadata. Maximum Frame-Average Light Level.
    minimum: 1
    maximum: 65535
    default: 400
    unit: cd/m2

  - identifier: terminate_on_pause
    title: Stop automatically
    type: boolean
    description: >
      Whether to stop playback at the end of the producer or when playback
      is paused.
    default: no
    widget: checkbox
