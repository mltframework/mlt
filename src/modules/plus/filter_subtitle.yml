schema_version: 7.0
type: filter
identifier: subtitle
title: Subtitle
version: 4
copyright: Meltytech, LLC
license: LGPLv2.1
language: en
tags:
  - Video
description: Overlay subtitles onto the video

parameters:
  - identifier: resource
    argument: yes
    title: Resource
    type: string
    description: The path to a text file that contains SRT subtitles
    required: no
    readonly: no

  - identifier: text
    title: Text
    type: string
    description: >
        A string that containes a complete SRT document.
        This parameter is ignored if resource is set.
    required: no
    readonly: no

  - identifier: feed
    title: Text
    type: string
    description: >
        A string that identifies the feed in the MLT Frame to overlay.
        This parameter is ignored if resource or text is set.
    required: no
    default: 0
    readonly: no

  - identifier: geometry
    title: Geometry
    type: rect
    description: A set of X/Y coordinates by which to adjust the text.
    default: 20%/80%:60%x20%:100

  - identifier: family
    title: Font family
    type: string
    description: >
      The typeface of the font.
    default: Sans
    readonly: no
    mutable: yes
    widget: combo

  - identifier: size
    title: Font size
    type: integer
    description: >
      The size in pixels of the font. 
    default: 48
    readonly: no
    mutable: yes
    widget: spinner

  - identifier: style
    title: Font style
    type: string
    description: >
      The style of the font.
    values:
      - normal
      - italic
    default: normal
    readonly: no
    mutable: yes
    widget: combo

  - identifier: weight
    title: Font weight
    type: integer
    description: The weight of the font.
    minimum: 100
    maximum: 1000
    default: 400
    readonly: no
    mutable: yes
    widget: spinner

  - identifier: fgcolour
    title: Foreground color
    type: string
    description: >
      A color value is a hexadecimal representation of RGB plus alpha channel 
      as 0xrrggbbaa. Colors can also be the words: white, black, red, green,
      or blue. You can also use a HTML-style color values #rrggbb or #aarrggbb.
    default: 0x000000ff
    readonly: no
    mutable: yes
    widget: color

  - identifier: bgcolour
    title: Background color
    type: string
    description: >
      A color value is a hexadecimal representation of RGB plus alpha channel 
      as 0xrrggbbaa. Colors can also be the words: white, black, red, green,
      or blue. You can also use a HTML-style color values #rrggbb or #aarrggbb.
    default: 0x00000020
    readonly: no
    mutable: yes
    widget: color

  - identifier: olcolour
    title: Outline color
    type: string
    description: >
      A color value is a hexadecimal representation of RGB plus alpha channel 
      as 0xrrggbbaa. Colors can also be the words: white, black, red, green,
      or blue. You can also use a HTML-style color values #rrggbb or #aarrggbb.
    readonly: no
    mutable: yes
    widget: color

  - identifier: outline
    title: Outline Width
    type: string
    description: >
      The width of the outline in pixels.
    readonly: no
    default: 0
    minimum: 0
    mutable: yes
    widget: spinner

  - identifier: underline
    title: Underline
    type: boolean
    description: Apply underline decoration to the text.
    default: 0
    readonly: no
    mutable: yes
    widget: checkbox

  - identifier: strikethrough
    title: Strikethrough
    type: boolean
    description: Apply strikethrough decoration to the text.
    default: 0
    readonly: no
    mutable: yes
    widget: checkbox

  - identifier: pad
    title: Padding
    type: integer
    description: >
      The number of pixels to pad the background rectangle beyond edges of text.
    readonly: no
    default: 0
    mutable: yes
    widget: spinner

  - identifier: halign
    title: Horizontal alignment
    description: >
      Set the horizontal alignment within the geometry rectangle.
    type: string
    default: left
    values:
      - left
      - centre
      - right
    mutable: yes
    widget: combo

  - identifier: valign
    title: Vertical alignment
    description: >
      Set the vertical alignment within the geometry rectangle.
    type: string
    default: top
    values:
      - top
      - middle
      - bottom
    mutable: yes
    widget: combo

  - identifier: opacity
    title: Opacity
    type: float
    description: Opacity of all elements - text, outline, and background
    readonly: no
    default: 1.0
    minimum: 0
    maximum: 1.0
    mutable: yes
    widget: slider

  - identifier: typewriter
    title: Typewriter Effect
    type: boolean
    description: >
      Enable typewriter effect where text appears progressively over time.
      Only supported when the qtext filter is available.
    default: 0
    minimum: 0
    maximum: 1
    readonly: no
    mutable: yes
    widget: checkbox

  - identifier: typewriter.step_length
    title: Typewriter Step Length
    type: integer
    description: >
      Number of frames between each character, word, or line appearance.
      Only supported when the qtext filter is available.
    default: 25
    minimum: 1
    readonly: no
    mutable: yes
    widget: spinner

  - identifier: typewriter.step_sigma
    title: Typewriter Step Variation
    type: integer
    description: >
      Random variation in timing (standard deviation in frames).
      Only supported when the qtext filter is available.
    default: 0
    minimum: 0
    readonly: no
    mutable: yes
    widget: spinner

  - identifier: typewriter.random_seed
    title: Typewriter Random Seed
    type: integer
    description: >
      Seed value for random number generation in timing variations.
      Only supported when the qtext filter is available.
    default: 0
    minimum: 0
    readonly: no
    mutable: yes
    widget: spinner

  - identifier: typewriter.macro_type
    title: Typewriter Animation Mode
    type: integer
    description: >
      Granularity of typewriter animation.
      Only supported when the qtext filter is available.
    values:
      - 1 # Character by character
      - 2 # Word by word
      - 3 # Line by line
    default: 1
    readonly: no
    mutable: yes
    widget: combo

  - identifier: typewriter.cursor
    title: Typewriter Cursor
    type: integer
    description: >
      Show blinking cursor during typewriter animation.
      0 = no cursor, 1 = cursor while typing, 2 = cursor always visible.
      Only supported when the qtext filter is available.
    default: 1
    minimum: 0
    maximum: 2
    readonly: no
    mutable: yes
    widget: combo

  - identifier: typewriter.cursor_blink_rate
    title: Cursor Blink Rate
    type: integer
    description: >
      Number of frames for cursor blink cycle (on + off).
      Only supported when the qtext filter is available.
    default: 25
    minimum: 0
    readonly: no
    mutable: yes
    widget: spinner
    unit: frames

  - identifier: typewriter.cursor_char
    title: Cursor Character
    type: string
    description: >
      Character to use for the blinking cursor.
      Only supported when the qtext filter is available.
    default: "|"
    readonly: no
    mutable: yes
    widget: text
