schema_version: 7.2
type: filter
identifier: strobe
title: Alpha strobing
version: 3
copyright: Martin Sandsmark
creator: Martin Sandsmark
license: LGPLv2.1
language: en
description: Strobes the alpha channel to 0. Many other filters overwrite the alpha channel, in that case this needs to be last.
tags:
  - Video
image_formats:
  - rgb
  - rgba
  - yuv422
  - yuv420p
  - yuv422p16
  - yuv420p10
  - yuv444p10
  - rgba64
parameters:
  - identifier: strobe_invert
    title: Invert
    type: boolean
    description: Whether to invert which frames are on and which is off
    default: 0
    mutable: yes
    animation: yes

  - identifier: interval
    title: Interval
    type: integer
    description: >
      Duration of strobe
    default: 1
    minimum: 1
    maximum: 100
    readonly: no
    mutable: yes
    animation: yes
    widget: spinner
