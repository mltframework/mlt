schema_version: 7.2
type: filter
identifier: movit.white_balance
title: White Balance (GLSL)
version: 2
copyright: Meltytech, LLC
creator: Steinar H. Gunderson
license: GPLv2
language: en
tags:
  - Video
description: Color correction in LMS color space.
image_formats:
  - glsl
parameters:
  - identifier: neutral_color
    title: Neutral Color
    type: string
    widget: color
    default: 0x7f7f7f00
    mutable: yes

  - identifier: color_temperature
    title: Color Temperature
    type: float
    minimum: 1000.0
    maximum: 15000.0
    default: 6500.0
    unit: Kelvin
    mutable: yes
