schema_version: 7.2
type: filter
identifier: movit.vignette
title: Vignette (GLSL)
version: 2
copyright: Meltytech, LLC
creator: Steinar H. Gunderson
license: GPLv2
language: en
tags:
  - Video
description: >
  A circular vignette, falling off as cos² of the distance from the center
  (the classic formula for approximating a real lens).
image_formats:
  - glsl
parameters:
  - identifier: radius
    title: Outer Radius
    type: float
    minimum: 0.0
    maximum: 1.0
    default: 0.3
    mutable: yes
    animation: yes

  - identifier: inner_radius
    title: Inner Radius
    type: float
    minimum: 0.0
    maximum: 1.0
    default: 0.3
    mutable: yes
    animation: yes
